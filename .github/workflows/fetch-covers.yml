# Temporary workflow: fetches missing book covers from Open Library on a
# GitHub-hosted runner (the local dev sandbox blocks outbound image hosts).
# Safe to delete once covers are committed.
name: Fetch book covers

on:
  push:
    branches: [claude/book-notes-section-5r1zoa]

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
        working-directory: library-src
      - run: node scripts/fetch-covers.mjs
        working-directory: library-src
      - name: Commit new covers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add library-src/public/covers
          git diff --cached --quiet || git commit -m "Add fetched book covers [skip ci]"
          git push
